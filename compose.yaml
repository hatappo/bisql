services:
  postgres:
    image: postgres:18.3
    container_name: bisql-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: bisql_dev
      POSTGRES_USER: bisql
      POSTGRES_PASSWORD: bisql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bisql -d bisql_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

volumes:
  postgres-data:
